<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg_gradient)"/>

  <!-- Decorative glow circles -->
  <circle cx="1050" cy="80" r="220" fill="url(#glow1)" fill-opacity="0.5"/>
  <circle cx="150" cy="560" r="180" fill="url(#glow2)" fill-opacity="0.35"/>
  <circle cx="600" cy="320" r="380" fill="url(#glow3)" fill-opacity="0.07"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1a2d4d" stroke-width="1" stroke-dasharray="4 8"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1a2d4d" stroke-width="1" stroke-dasharray="4 8"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#1a2d4d" stroke-width="1" stroke-dasharray="4 8"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1a2d4d" stroke-width="1" stroke-dasharray="4 8"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#1a2d4d" stroke-width="1" stroke-dasharray="4 8"/>

  <!-- Central card frame -->
  <rect x="420" y="155" width="360" height="320" rx="20" fill="url(#card_bg)" stroke="rgba(196,162,75,0.28)" stroke-width="1.5"/>

  <!-- Image placeholder area inside card -->
  <rect x="440" y="175" width="320" height="180" rx="12" fill="url(#img_area)"/>

  <!-- Diamond / image icon -->
  <g transform="translate(560, 245)">
    <rect x="0" y="40" width="80" height="80" rx="8" fill="url(#icon_bg)" transform="rotate(45 40 40)"/>
    <!-- Mountain icon -->
    <path d="M18 88 L40 52 L62 88 Z" fill="rgba(196,162,75,0.5)" stroke="none"/>
    <path d="M28 88 L40 68 L52 88 Z" fill="rgba(196,162,75,0.85)" stroke="none"/>
    <circle cx="54" cy="58" r="7" fill="rgba(196,162,75,0.6)"/>
  </g>

  <!-- Text lines inside card -->
  <rect x="456" y="374" width="140" height="10" rx="5" fill="rgba(196,162,75,0.7)"/>
  <rect x="456" y="394" width="288" height="9" rx="4.5" fill="rgba(233,237,247,0.55)"/>
  <rect x="456" y="413" width="220" height="9" rx="4.5" fill="rgba(233,237,247,0.3)"/>
  <rect x="456" y="438" width="96" height="8" rx="4" fill="rgba(143,160,197,0.35)"/>

  <!-- Left decorative lines -->
  <rect x="80" y="280" width="180" height="3" rx="1.5" fill="rgba(196,162,75,0.18)"/>
  <rect x="80" y="295" width="120" height="3" rx="1.5" fill="rgba(196,162,75,0.1)"/>
  <rect x="80" y="310" width="150" height="3" rx="1.5" fill="rgba(196,162,75,0.1)"/>

  <!-- Right decorative lines -->
  <rect x="940" y="280" width="180" height="3" rx="1.5" fill="rgba(196,162,75,0.18)"/>
  <rect x="960" y="295" width="120" height="3" rx="1.5" fill="rgba(196,162,75,0.1)"/>
  <rect x="950" y="310" width="150" height="3" rx="1.5" fill="rgba(196,162,75,0.1)"/>

  <!-- DigyNotes logo text (subtle) -->
  <text x="600" y="548" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3" fill="rgba(196,162,75,0.35)" text-anchor="middle">DigyNotes</text>

  <defs>
    <linearGradient id="bg_gradient" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#07101F"/>
      <stop offset="50%" stop-color="#06101D"/>
      <stop offset="100%" stop-color="#040C18"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1050 80) rotate(90) scale(220)">
      <stop stop-color="#C4A24B"/>
      <stop offset="1" stop-color="#C4A24B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(150 560) rotate(90) scale(180)">
      <stop stop-color="#223A63"/>
      <stop offset="1" stop-color="#223A63" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 320) rotate(90) scale(380)">
      <stop stop-color="#1A3060"/>
      <stop offset="1" stop-color="#1A3060" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card_bg" x1="420" y1="155" x2="780" y2="475" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D1830" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#08101F" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="img_area" x1="440" y1="175" x2="760" y2="355" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14274A"/>
      <stop offset="100%" stop-color="#0A1528"/>
    </linearGradient>
    <radialGradient id="icon_bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 265) rotate(90) scale(45)">
      <stop stop-color="#1E3560"/>
      <stop offset="1" stop-color="#0E1D36"/>
    </radialGradient>
  </defs>
</svg>
