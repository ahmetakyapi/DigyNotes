<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#0c0c0c"/>
  <rect width="1200" height="800" fill="url(#gg)" opacity="0.5"/>
  <!-- Game Controller -->
  <g transform="translate(600,400)" opacity="0.9">
    <!-- Controller body -->
    <path d="M-180-40 C-180-80-140-100-100-100 L100-100 C140-100 180-80 180-40 L180 20 C180 70 140 120 100 120 L60 120 C40 120 20 100 0 80 C-20 100 -40 120 -60 120 L-100 120 C-140 120 -180 70 -180 20Z" fill="#161616" stroke="#2a2a2a" stroke-width="2.5"/>
    <!-- D-pad -->
    <rect x="-110" y="-30" width="60" height="20" rx="4" fill="#2a2a2a"/>
    <rect x="-90" y="-50" width="20" height="60" rx="4" fill="#2a2a2a"/>
    <!-- Center D-pad dot -->
    <circle cx="-80" cy="-20" r="5" fill="#555555"/>
    <!-- Action buttons -->
    <circle cx="60" cy="-40" r="14" fill="#2a2a2a" stroke="#c9a84c" stroke-width="1.5" opacity="0.8"/>
    <circle cx="90" cy="-20" r="14" fill="#2a2a2a" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
    <circle cx="60" cy="0" r="14" fill="#2a2a2a" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
    <circle cx="30" cy="-20" r="14" fill="#2a2a2a" stroke="#c9a84c" stroke-width="1.5" opacity="0.4"/>
    <!-- Button symbols -->
    <text x="60" y="-35" text-anchor="middle" fill="#c9a84c" font-size="14" font-family="sans-serif" opacity="0.7">▲</text>
    <text x="90" y="-15" text-anchor="middle" fill="#c9a84c" font-size="14" font-family="sans-serif" opacity="0.5">●</text>
    <!-- Analog sticks -->
    <circle cx="-40" cy="40" r="20" fill="#2a2a2a" stroke="#555555" stroke-width="1.5"/>
    <circle cx="-40" cy="40" r="8" fill="#555555"/>
    <circle cx="100" cy="50" r="20" fill="#2a2a2a" stroke="#555555" stroke-width="1.5"/>
    <circle cx="100" cy="50" r="8" fill="#555555"/>
    <!-- Center button -->
    <circle cx="0" cy="-20" r="10" fill="#c9a84c" opacity="0.3"/>
  </g>
  <!-- Ambient glow -->
  <circle cx="600" cy="380" r="260" fill="url(#gglow)" opacity="0.1"/>
  <defs>
    <linearGradient id="gg" x1="0" y1="0" x2="1200" y2="800">
      <stop stop-color="#161616"/>
      <stop offset="1" stop-color="#0c0c0c"/>
    </linearGradient>
    <radialGradient id="gglow" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#c9a84c"/>
      <stop offset="1" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
