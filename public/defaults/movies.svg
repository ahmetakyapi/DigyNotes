<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#0c0c0c"/>
  <rect width="1200" height="800" fill="url(#mg)" opacity="0.5"/>
  <!-- Film strip perforations left -->
  <rect x="80" y="100" width="28" height="20" rx="4" fill="#2a2a2a"/>
  <rect x="80" y="160" width="28" height="20" rx="4" fill="#2a2a2a"/>
  <rect x="80" y="220" width="28" height="20" rx="4" fill="#2a2a2a"/>
  <rect x="80" y="280" width="28" height="20" rx="4" fill="#2a2a2a"/>
  <rect x="80" y="340" width="28" height="20" rx="4" fill="#2a2a2a"/>
  <rect x="80" y="400" width="28" height="20" rx="4" fill="#2a2a2a"/>
  <rect x="80" y="460" width="28" height="20" rx="4" fill="#2a2a2a"/>
  <rect x="80" y="520" width="28" height="20" rx="4" fill="#2a2a2a"/>
  <rect x="80" y="580" width="28" height="20" rx="4" fill="#2a2a2a"/>
  <rect x="80" y="640" width="28" height="20" rx="4" fill="#2a2a2a"/>
  <!-- Film strip perforations right -->
  <rect x="1092" y="100" width="28" height="20" rx="4" fill="#2a2a2a"/>
  <rect x="1092" y="160" width="28" height="20" rx="4" fill="#2a2a2a"/>
  <rect x="1092" y="220" width="28" height="20" rx="4" fill="#2a2a2a"/>
  <rect x="1092" y="280" width="28" height="20" rx="4" fill="#2a2a2a"/>
  <rect x="1092" y="340" width="28" height="20" rx="4" fill="#2a2a2a"/>
  <rect x="1092" y="400" width="28" height="20" rx="4" fill="#2a2a2a"/>
  <rect x="1092" y="460" width="28" height="20" rx="4" fill="#2a2a2a"/>
  <rect x="1092" y="520" width="28" height="20" rx="4" fill="#2a2a2a"/>
  <rect x="1092" y="580" width="28" height="20" rx="4" fill="#2a2a2a"/>
  <rect x="1092" y="640" width="28" height="20" rx="4" fill="#2a2a2a"/>
  <!-- Clapperboard -->
  <g transform="translate(600,400)" opacity="0.9">
    <!-- Board body -->
    <rect x="-140" y="-20" width="280" height="160" rx="12" fill="#161616" stroke="#2a2a2a" stroke-width="2"/>
    <!-- Clapper top -->
    <path d="M-140-20 L-140-60 C-140-68-134-74-126-74 L126-74 C134-74 140-68 140-60 L140-20Z" fill="#161616" stroke="#2a2a2a" stroke-width="2"/>
    <!-- Clapper stripes -->
    <rect x="-120" y="-64" width="40" height="36" rx="2" fill="#c9a84c" opacity="0.8" transform="skewX(-8)"/>
    <rect x="-50" y="-64" width="40" height="36" rx="2" fill="#c9a84c" opacity="0.8" transform="skewX(-8)"/>
    <rect x="20" y="-64" width="40" height="36" rx="2" fill="#c9a84c" opacity="0.8" transform="skewX(-8)"/>
    <rect x="90" y="-64" width="40" height="36" rx="2" fill="#c9a84c" opacity="0.8" transform="skewX(-8)"/>
    <!-- Board lines -->
    <rect x="-110" y="10" width="140" height="8" rx="4" fill="#c9a84c" opacity="0.6"/>
    <rect x="-110" y="40" width="220" height="6" rx="3" fill="#888888" opacity="0.3"/>
    <rect x="-110" y="62" width="180" height="6" rx="3" fill="#888888" opacity="0.2"/>
    <!-- Play circle -->
    <circle cx="70" cy="90" r="28" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.5"/>
    <polygon points="62,76 62,104 86,90" fill="#c9a84c" opacity="0.5"/>
  </g>
  <!-- Ambient glow -->
  <circle cx="600" cy="380" r="260" fill="url(#glow)" opacity="0.12"/>
  <defs>
    <linearGradient id="mg" x1="0" y1="0" x2="1200" y2="800">
      <stop stop-color="#161616"/>
      <stop offset="1" stop-color="#0c0c0c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#c9a84c"/>
      <stop offset="1" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
