<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#0c0c0c"/>
  <rect width="1200" height="800" fill="url(#sg)" opacity="0.5"/>
  <!-- TV Screen -->
  <g transform="translate(600,380)" opacity="0.9">
    <!-- TV body -->
    <rect x="-180" y="-130" width="360" height="240" rx="16" fill="#161616" stroke="#2a2a2a" stroke-width="2.5"/>
    <!-- Screen -->
    <rect x="-150" y="-100" width="300" height="180" rx="8" fill="#0c0c0c" stroke="#2a2a2a" stroke-width="1.5"/>
    <!-- Screen content - signal bars -->
    <rect x="-100" y="20" width="16" height="40" rx="3" fill="#c9a84c" opacity="0.4"/>
    <rect x="-70" y="0" width="16" height="60" rx="3" fill="#c9a84c" opacity="0.5"/>
    <rect x="-40" y="-20" width="16" height="80" rx="3" fill="#c9a84c" opacity="0.6"/>
    <rect x="-10" y="-40" width="16" height="100" rx="3" fill="#c9a84c" opacity="0.7"/>
    <rect x="20" y="-60" width="16" height="120" rx="3" fill="#c9a84c" opacity="0.8"/>
    <!-- Episode indicator dots -->
    <circle cx="-60" cy="-60" r="5" fill="#c9a84c" opacity="0.8"/>
    <circle cx="-40" cy="-60" r="5" fill="#c9a84c" opacity="0.6"/>
    <circle cx="-20" cy="-60" r="5" fill="#888888" opacity="0.3"/>
    <circle cx="0" cy="-60" r="5" fill="#888888" opacity="0.3"/>
    <circle cx="20" cy="-60" r="5" fill="#888888" opacity="0.3"/>
    <!-- Stand -->
    <rect x="-60" y="114" width="120" height="8" rx="4" fill="#2a2a2a"/>
    <rect x="-20" y="106" width="40" height="16" rx="2" fill="#2a2a2a"/>
    <!-- Text lines on screen -->
    <rect x="60" y="-40" width="70" height="6" rx="3" fill="#888888" opacity="0.3"/>
    <rect x="60" y="-24" width="50" height="6" rx="3" fill="#888888" opacity="0.2"/>
  </g>
  <!-- Ambient glow -->
  <circle cx="600" cy="360" r="240" fill="url(#sglow)" opacity="0.1"/>
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="1200" y2="800">
      <stop stop-color="#161616"/>
      <stop offset="1" stop-color="#0c0c0c"/>
    </linearGradient>
    <radialGradient id="sglow" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#c9a84c"/>
      <stop offset="1" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
